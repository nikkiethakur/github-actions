name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: DockerHub Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/simple-cicd-app .

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/simple-cicd-app

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop app || true
          docker rm app || true
          docker pull ${{ secrets.DOCKER_USERNAME }}/simple-cicd-app
          docker run -d -p 80:80 --name app ${{ secrets.DOCKER_USERNAME }}/simple-cicd-app